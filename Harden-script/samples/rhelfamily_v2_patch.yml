---
# ============================================================================
# ExoVirt sample hardening — RHEL FAMILY (Rocky / AlmaLinux / RHEL / Fedora) — VERSION 2 (baseline + patching)
# ============================================================================
# Everything in v1, PLUS package patching and automatic security updates.
# NEEDS INTERNET + an enabled dnf repo. Works on ROCKY & FEDORA out of the box.
# On plain RHEL, dnf has NO repos until a subscription is attached (or a local repo
# mounted) — this playbook DETECTS that and skips patching (v1 config still applies)
# rather than failing. Runs via the portal "Hardening" button as `sysuser` + sudo.
# ============================================================================
- name: ExoVirt hardening v2 — RHEL family (Rocky/AlmaLinux/RHEL/Fedora) baseline + patching
  hosts: all
  become: true
  gather_facts: false

  handlers:
    - name: reload sshd
      ansible.builtin.shell: "systemctl reload sshd 2>/dev/null || systemctl reload ssh"
      changed_when: false

  tasks:
    # ---- v1 baseline (repeated so v2 is a complete superset) ----
    - name: "1. Harden SSH — disable root login + sane limits"
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/60-exovirt-hardening.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by ExoVirt hardening (v2)
          PermitRootLogin no
          PermitEmptyPasswords no
          X11Forwarding no
          MaxAuthTries 4
          LoginGraceTime 30
          ClientAliveInterval 300
          ClientAliveCountMax 2
      notify: reload sshd

    - name: "2. Lock the root account password"
      ansible.builtin.user:
        name: root
        password_lock: true

    # ---- v2: patching + automatic security updates ----
    # IMPORTANT (RHEL vs Rocky/Fedora): dnf needs an ENABLED repo. Rocky & Fedora ship
    # public repos, so patching runs. Plain RHEL has NO repos until you attach a
    # subscription (`subscription-manager register --auto-attach`) or mount a local repo.
    # So we CHECK first and skip patching gracefully (the v1 config hardening above is
    # still applied) instead of failing the whole hardening run.
    - name: "3. Check for an enabled dnf repository"
      ansible.builtin.command: dnf repolist --enabled -q
      register: exovirt_dnf_repos
      changed_when: false
      failed_when: false

    - name: "3b. Decide whether patching is possible"
      ansible.builtin.set_fact:
        exovirt_have_repos: "{{ exovirt_dnf_repos.rc == 0 and (exovirt_dnf_repos.stdout | trim | length) > 0 }}"

    - name: "NOTE — patching SKIPPED (no enabled dnf repo, e.g. un-subscribed RHEL)"
      ansible.builtin.debug:
        msg: >-
          No enabled dnf repository found. On RHEL, register a subscription
          (subscription-manager register --auto-attach) or mount a local repo, then
          re-run v2. The v1 config hardening was still applied.
      when: not exovirt_have_repos

    # NOTE: we drive the `dnf` CLI via `command` instead of the ansible.builtin.dnf module. On very
    # new dnf5 systems (e.g. Fedora 44) the module's libdnf5 bindings can be out of sync with the
    # ansible-core shipped on the control node, crashing with
    # "'Base' object has no attribute 'load_config_from_file'". The CLI is stable across dnf4 (EL)
    # and dnf5 (Fedora). `changed_when` keys off dnf's "Nothing to do" so reporting stays accurate.
    - name: "4. Apply available package updates (upgrade installed packages)"
      ansible.builtin.command: dnf -y --refresh upgrade
      register: exovirt_dnf_upgrade
      changed_when: "'Nothing to do' not in exovirt_dnf_upgrade.stdout"
      when: exovirt_have_repos

    - name: "5. Install dnf-automatic (automatic security updates)"
      ansible.builtin.command: dnf -y install dnf-automatic
      register: exovirt_dnf_install
      changed_when: "'Nothing to do' not in exovirt_dnf_install.stdout"
      when: exovirt_have_repos

    - name: "5b. Configure dnf-automatic to APPLY (not just download) updates"
      ansible.builtin.lineinfile:
        path: /etc/dnf/automatic.conf
        regexp: "^apply_updates ="
        line: "apply_updates = yes"
      when: exovirt_have_repos

    - name: "5c. Enable the dnf-automatic timer"
      ansible.builtin.systemd:
        name: dnf-automatic.timer
        enabled: true
        state: started
      when: exovirt_have_repos
