# InfraProv — single-domain Nginx site: static SPA + Laravel API (PHP-FPM) + Reverb WebSocket (wss).
# Install: sudo cp deploy/nginx/infraprov.conf /etc/nginx/sites-available/infraprov
#          sudo ln -s /etc/nginx/sites-available/infraprov /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# TLS certs: sudo certbot --nginx -d infraprov.example.com   (then certbot manages renewal)

# 1) HTTP → HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name infraprov.example.com;
    return 301 https://$host$request_uri;
}

# 2) HTTPS: SPA + API + WebSocket.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name infraprov.example.com;

    ssl_certificate     /etc/letsencrypt/live/infraprov.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/infraprov.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Catalog image uploads are up to 8 MB (see CatalogController) — allow headroom.
    client_max_body_size 12m;

    # Security headers.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Built SPA (static) ---
    root /home/appd/my-project/frontend/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Laravel API / Sanctum / broadcasting-auth / storage (PHP-FPM, root = backend/public) ---
    location ~ ^/(api|broadcasting|sanctum|storage)/ {
        root /home/appd/my-project/backend/public;
        try_files $uri /index.php?$query_string;
    }
    location ~ \.php$ {
        root /home/appd/my-project/backend/public;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param HTTPS on;
    }

    # --- Reverb WebSocket (Pusher protocol path is /app/{key}) → terminate TLS here, proxy ws ---
    # The frontend connects to wss://infraprov.example.com (port 443); set in frontend/.env:
    #   VITE_REVERB_HOST=infraprov.example.com  VITE_REVERB_PORT=443  VITE_REVERB_SCHEME=https
    # NOTE: the broadcast API (/apps/{id}/events) is NOT proxied — workers POST to 127.0.0.1:8080 internally.
    location /app/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # keep idle WS connections alive (1h)
        proxy_send_timeout 3600s;
    }
}
