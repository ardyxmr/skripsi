# InfraProv — dedicated Redis instance for the JOB QUEUE + Reverb pub/sub (port 6380).
# Separate from the cache instance (:6379, allkeys-lru) precisely so the two eviction
# policies don't mix: a job queue must NEVER evict (a dropped job = a lost provision/destroy).
# Install to /etc/redis/redis-queue.conf and run via systemd (deploy/systemd/redis-queue.service).

port 6380
bind 127.0.0.1 -::1
protected-mode yes

# systemd supervises it (Type=notify): run in the foreground and notify readiness.
supervised systemd
daemonize no
pidfile /run/redis-queue/redis-queue.pid
logfile ""                      # → stdout → journald (journalctl -u redis-queue)
dir /var/lib/redis-queue

# Durability: AOF so a restart never loses queued jobs. RDB snapshots disabled (AOF is enough).
appendonly yes
appendfsync everysec
appendfilename "appendonly.aof"
save ""

# NEVER evict — when full, writes ERROR loudly (caught at dispatch) instead of silently dropping jobs.
maxmemory 512mb
maxmemory-policy noeviction

# Connection tuning (pairs with the sysctl net.core.somaxconn raise).
tcp-backlog 1024
tcp-keepalive 60
timeout 0

# Production: set a password and mirror it into .env REDIS_QUEUE_PASSWORD.
# requirepass CHANGE_ME_IN_PROD
