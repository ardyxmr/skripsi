# InfraProv kernel tuning for Redis + Reverb. Install to /etc/sysctl.d/99-infraprov.conf
# then apply with: sudo sysctl --system
#
# Redis fork/BGSAVE needs overcommit, or saves fail under memory pressure.
vm.overcommit_memory = 1
# Keep Redis off swap.
vm.swappiness = 10
# Default 128 throttles the accept backlog under bursty WS reconnects (Reverb) + Redis tcp-backlog.
net.core.somaxconn = 1024
