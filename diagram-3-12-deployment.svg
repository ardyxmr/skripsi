<text x="965" y="186" font-size="13" font-weight="700" text-anchor="middle" fill="#2B2B33">Cluster Proxmox VE</text>

<!-- proxmox node 1 -->
<rect x="866" y="200" width="198" height="120" rx="6" fill="#FBF3E7" stroke="#C79A55" stroke-width="1.2"/>
