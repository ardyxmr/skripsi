<text x="921" y="280" font-size="10.5" text-anchor="middle" fill="#5A421C">Virtual</text>
<rect x="970" y="230" width="78" height="76" rx="5" fill="#FDEBD0" stroke="#C79A55" stroke-width="1.1"/>
<text x="1009" y="266" font-size="10.5" text-anchor="middle" fill="#5A421C">Mesin</text>
<text x="1009" y="280" font-size="10.5" text-anchor="middle" fill="#5A421C">Virtual</text>

<!-- proxmox node 2 -->
<rect x="866" y="336" width="198" height="118" rx="6" fill="#FBF3E7" stroke="#C79A55" stroke-width="1.2"/>
<text x="965" y="354" font-size="11.5" font-weight="600" text-anchor="middle" fill="#5A421C">Proxmox Node 2</text>
<rect x="882" y="366" width="78" height="72" rx="5" fill="#FDEBD0" stroke="#C79A55" stroke-width="1.1"/>
<text x="921" y="400" font-size="10.5" text-anchor="middle" fill="#5A421C">Mesin</text>
<text x="921" y="414" font-size="10.5" text-anchor="middle" fill="#5A421C">Virtual</text>
<rect x="970" y="366" width="78" height="72" rx="5" fill="#FDEBD0" stroke="#C79A55" stroke-width="1.1"/>
<text x="1009" y="400" font-size="10.5" text-anchor="middle" fill="#5A421C">Mesin</text>
<text x="1009" y="414" font-size="10.5" text-anchor="middle" fill="#5A421C">Virtual</text>

<!-- ============ COMMUNICATION PATHS ============ -->
<!-- client - app server -->
<line x1="240" y1="325" x2="380" y2="300" stroke="#4B4B57" stroke-width="1.4"/>
<text x="310" y="303" font-size="10.5" text-anchor="middle" fill="#33404A" font-style="italic">«HTTP/HTTPS»</text>
<!-- app server - proxmox (API) -->
<line x1="726" y1="215" x2="850" y2="240" stroke="#4B4B57" stroke-width="1.4"/>
<text x="788" y="212" font-size="10.5" text-anchor="middle" fill="#33404A" font-style="italic">«Proxmox VE API»</text>
<!-- app server - proxmox (SSH) -->
<line x1="726" y1="380" x2="850" y2="405" stroke="#4B4B57" stroke-width="1.4"/>
<text x="788" y="404" font-size="10.5" text-anchor="middle" fill="#33404A" font-style="italic">«SSH»</text>

<!-- legend -->
<g font-size="11" fill="#444">
<line x1="40" y1="500" x2="76" y2="500" stroke="#4B4B57" stroke-width="1.4"/>
