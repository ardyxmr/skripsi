<svg viewBox="0 0 1120 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-labelledby="t d">
<title id="t">Gambar 3.12 - Deployment Diagram</title>
<desc id="d">Deployment diagram ProvIO: perangkat klien (peramban) terhubung ke server aplikasi (React, Laravel, PostgreSQL, Redis, Laravel Reverb, Terraform, Ansible) yang berkomunikasi dengan cluster Proxmox VE melalui API dan SSH.</desc>
<rect x="0" y="0" width="1120" height="560" fill="#FFFFFF"/>

<!-- ============ CLIENT NODE ============ -->
<polygon points="40,250 56,234 256,234 240,250" fill="#ECECF2" stroke="#B9B9C4" stroke-width="1.2"/>
<polygon points="240,250 256,234 256,384 240,400" fill="#E2E2EA" stroke="#B9B9C4" stroke-width="1.2"/>
<rect x="40" y="250" width="200" height="150" fill="#F7F7FA" stroke="#B9B9C4" stroke-width="1.2"/>
<text x="140" y="270" font-size="10.5" text-anchor="middle" fill="#666" font-style="italic">«device»</text>
<text x="140" y="286" font-size="13" font-weight="700" text-anchor="middle" fill="#2B2B33">Perangkat Klien</text>
<rect x="62" y="305" width="156" height="72" rx="6" fill="#EAF2FB" stroke="#5B8DBE" stroke-width="1.3"/>
<text x="140" y="326" font-size="9.5" text-anchor="middle" fill="#4A6072" font-style="italic">«artifact»</text>
<text x="140" y="342" font-size="12" font-weight="600" text-anchor="middle" fill="#22303F">Web Browser</text>
<text x="140" y="360" font-size="10.5" text-anchor="middle" fill="#4A6072">Antarmuka React.js</text>

<!-- ============ APPLICATION SERVER NODE ============ -->
<polygon points="380,90 396,74 726,74 710,90" fill="#ECECF2" stroke="#B9B9C4" stroke-width="1.2"/>
<polygon points="710,90 726,74 726,454 710,470" fill="#E2E2EA" stroke="#B9B9C4" stroke-width="1.2"/>
<rect x="380" y="90" width="330" height="380" fill="#F7F7FA" stroke="#B9B9C4" stroke-width="1.2"/>
<text x="545" y="110" font-size="10.5" text-anchor="middle" fill="#666" font-style="italic">«server»</text>
<text x="545" y="126" font-size="13.5" font-weight="700" text-anchor="middle" fill="#2B2B33">Server Aplikasi</text>

<!-- artifacts row1 -->
<rect x="398" y="142" width="142" height="46" rx="6" fill="#EAF2FB" stroke="#5B8DBE" stroke-width="1.2"/>
<text x="469" y="162" font-size="12" font-weight="600" text-anchor="middle" fill="#22303F">React.js</text>
<text x="469" y="178" font-size="10" text-anchor="middle" fill="#4A6072">Frontend</text>
<rect x="552" y="142" width="142" height="46" rx="6" fill="#EAF2FB" stroke="#5B8DBE" stroke-width="1.2"/>
<text x="623" y="162" font-size="12" font-weight="600" text-anchor="middle" fill="#22303F">Laravel</text>
<text x="623" y="178" font-size="10" text-anchor="middle" fill="#4A6072">Backend / API</text>

<!-- artifacts row2 -->
<rect x="398" y="200" width="142" height="46" rx="6" fill="#EAF2FB" stroke="#5B8DBE" stroke-width="1.2"/>
<text x="469" y="220" font-size="12" font-weight="600" text-anchor="middle" fill="#22303F">PostgreSQL</text>
<text x="469" y="236" font-size="10" text-anchor="middle" fill="#4A6072">Basis Data</text>
<rect x="552" y="200" width="142" height="46" rx="6" fill="#EAF2FB" stroke="#5B8DBE" stroke-width="1.2"/>
<text x="623" y="220" font-size="12" font-weight="600" text-anchor="middle" fill="#22303F">Redis</text>
<text x="623" y="236" font-size="10" text-anchor="middle" fill="#4A6072">Cache / Antrean</text>

<!-- artifacts row3 -->
<rect x="398" y="258" width="296" height="42" rx="6" fill="#EAF2FB" stroke="#5B8DBE" stroke-width="1.2"/>
<text x="546" y="278" font-size="12" font-weight="600" text-anchor="middle" fill="#22303F">Laravel Reverb</text>
<text x="546" y="293" font-size="10" text-anchor="middle" fill="#4A6072">WebSocket real-time</text>

<!-- orchestration group -->
<rect x="392" y="316" width="308" height="140" rx="8" fill="#F4F0FA" stroke="#9F86C9" stroke-width="1.1" stroke-dasharray="5 4"/>
<text x="546" y="334" font-size="10.5" text-anchor="middle" fill="#6B5591" font-style="italic">Mesin Orkestrasi (IaC)</text>
<rect x="404" y="344" width="132" height="46" rx="6" fill="#E9DEF5" stroke="#9F86C9" stroke-width="1.2"/>
<text x="470" y="364" font-size="12" font-weight="600" text-anchor="middle" fill="#2C2348">Terraform</text>
<text x="470" y="380" font-size="10" text-anchor="middle" fill="#5A4A78">Provisioning</text>
<rect x="556" y="344" width="132" height="46" rx="6" fill="#E9DEF5" stroke="#9F86C9" stroke-width="1.2"/>
<text x="622" y="364" font-size="12" font-weight="600" text-anchor="middle" fill="#2C2348">Ansible</text>
<text x="622" y="380" font-size="10" text-anchor="middle" fill="#5A4A78">Konfigurasi / Hardening</text>
<text x="546" y="428" font-size="10.5" text-anchor="middle" fill="#6B5591">Terraform → API Proxmox VE</text>
<text x="546" y="444" font-size="10.5" text-anchor="middle" fill="#6B5591">Ansible → SSH ke Mesin Virtual</text>

