<svg viewBox="0 0 1120 800" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-labelledby="t d">
<title id="t">Gambar 3.2 - Use Case Diagram</title>
<desc id="d">Use case diagram aplikasi ProvIO dengan tiga aktor (User, Approver, Administrator) berelasi generalisasi, serta relasi include dan extend antar use case.</desc>
<defs>
<marker id="oa" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto"><path d="M1,1 L9,4 L1,7" fill="none" stroke="#7A5AA6" stroke-width="1.4"/></marker>
</defs>
<rect x="0" y="0" width="1120" height="800" fill="#FFFFFF"/>

<!-- System boundary -->
<rect x="300" y="40" width="800" height="720" rx="14" fill="#FCFCFE" stroke="#8891A3" stroke-width="1.4"/>
<text x="700" y="66" font-size="15" font-weight="700" text-anchor="middle" fill="#2B2B33">Sistem ProvIO</text>

<!-- ===================== ACTORS ===================== -->
<!-- User -->
<g stroke="#333" stroke-width="2" fill="none">
<circle cx="90" cy="110" r="13" fill="#FFFFFF"/>
<line x1="90" y1="123" x2="90" y2="155"/>
<line x1="74" y1="136" x2="106" y2="136"/>
<line x1="90" y1="155" x2="76" y2="176"/>
<line x1="90" y1="155" x2="104" y2="176"/>
</g>
<text x="90" y="196" font-size="13" font-weight="700" text-anchor="middle" fill="#2B2B33">User</text>
<text x="90" y="211" font-size="10" text-anchor="middle" fill="#666">(Requestor)</text>

<!-- Approver -->
<g stroke="#333" stroke-width="2" fill="none">
<circle cx="90" cy="360" r="13" fill="#FFFFFF"/>
<line x1="90" y1="373" x2="90" y2="405"/>
<line x1="74" y1="386" x2="106" y2="386"/>
<line x1="90" y1="405" x2="76" y2="426"/>
<line x1="90" y1="405" x2="104" y2="426"/>
</g>
<text x="90" y="446" font-size="13" font-weight="700" text-anchor="middle" fill="#2B2B33">Approver</text>
<text x="90" y="461" font-size="10" text-anchor="middle" fill="#666">(Manager)</text>

<!-- Administrator -->
<g stroke="#333" stroke-width="2" fill="none">
<circle cx="90" cy="600" r="13" fill="#FFFFFF"/>
<line x1="90" y1="613" x2="90" y2="645"/>
<line x1="74" y1="626" x2="106" y2="626"/>
<line x1="90" y1="645" x2="76" y2="666"/>
<line x1="90" y1="645" x2="104" y2="666"/>
</g>
<text x="90" y="686" font-size="13" font-weight="700" text-anchor="middle" fill="#2B2B33">Administrator</text>

<!-- ===================== GENERALIZATION ===================== -->
<!-- Approver --|> User -->
<line x1="90" y1="347" x2="90" y2="228" stroke="#444" stroke-width="1.4"/>
<polygon points="90,212 82,228 98,228" fill="#FFFFFF" stroke="#444" stroke-width="1.4"/>
<!-- Administrator --|> Approver -->
<line x1="90" y1="587" x2="90" y2="478" stroke="#444" stroke-width="1.4"/>
<polygon points="90,462 82,478 98,478" fill="#FFFFFF" stroke="#444" stroke-width="1.4"/>
<text x="150" y="300" font-size="10" text-anchor="middle" fill="#555" font-style="italic" transform="rotate(-90 150 300)">generalisasi</text>

<!-- ===================== USE CASES ===================== -->
<!-- style helpers via inline attrs -->
<!-- Login -->
<ellipse cx="435" cy="110" rx="72" ry="26" fill="#EAF2FB" stroke="#5B8DBE" stroke-width="1.3"/>
<text x="435" y="114" font-size="12.5" text-anchor="middle" fill="#22303F">Login</text>

<!-- Ajukan Provisioning -->
<ellipse cx="452" cy="205" rx="108" ry="33" fill="#EAF2FB" stroke="#5B8DBE" stroke-width="1.3"/>
<text x="452" y="201" font-size="12.5" text-anchor="middle" fill="#22303F">Ajukan Provisioning</text>
<text x="452" y="217" font-size="12.5" text-anchor="middle" fill="#22303F">Mesin Virtual</text>

<!-- Kelola Inventaris -->
<ellipse cx="452" cy="310" rx="108" ry="33" fill="#EAF2FB" stroke="#5B8DBE" stroke-width="1.3"/>
<text x="452" y="306" font-size="12.5" text-anchor="middle" fill="#22303F">Kelola Inventaris</text>
<text x="452" y="322" font-size="12.5" text-anchor="middle" fill="#22303F">Mesin Virtual</text>

<!-- Setujui Permintaan -->
<ellipse cx="452" cy="455" rx="100" ry="31" fill="#EAF2FB" stroke="#5B8DBE" stroke-width="1.3"/>
<text x="452" y="451" font-size="12.5" text-anchor="middle" fill="#22303F">Setujui</text>
<text x="452" y="467" font-size="12.5" text-anchor="middle" fill="#22303F">Permintaan</text>

<!-- Kelola Konfigurasi Sistem -->
<ellipse cx="458" cy="650" rx="110" ry="33" fill="#EAF2FB" stroke="#5B8DBE" stroke-width="1.3"/>
<text x="458" y="646" font-size="12.5" text-anchor="middle" fill="#22303F">Kelola Konfigurasi</text>
<text x="458" y="662" font-size="12.5" text-anchor="middle" fill="#22303F">Sistem</text>

<!-- Kelola Pengguna -->
<ellipse cx="458" cy="720" rx="95" ry="27" fill="#EAF2FB" stroke="#5B8DBE" stroke-width="1.3"/>
<text x="458" y="724" font-size="12.5" text-anchor="middle" fill="#22303F">Kelola Pengguna</text>

<!-- Validasi Data (include target) -->
<ellipse cx="775" cy="150" rx="98" ry="31" fill="#F3EDFA" stroke="#7A5AA6" stroke-width="1.3"/>
<text x="775" y="146" font-size="12" text-anchor="middle" fill="#33254A">Validasi Data</text>
<text x="775" y="162" font-size="12" text-anchor="middle" fill="#33254A">Permintaan</text>

<!-- Perpanjang / Ubah / Hapus (extend of Inventaris) -->
<ellipse cx="815" cy="258" rx="92" ry="30" fill="#F3EDFA" stroke="#7A5AA6" stroke-width="1.3"/>
<text x="815" y="254" font-size="12" text-anchor="middle" fill="#33254A">Perpanjang</text>
<text x="815" y="270" font-size="12" text-anchor="middle" fill="#33254A">Masa Aktif</text>

<ellipse cx="815" cy="322" rx="92" ry="28" fill="#F3EDFA" stroke="#7A5AA6" stroke-width="1.3"/>
<text x="815" y="318" font-size="12" text-anchor="middle" fill="#33254A">Ubah Sumber</text>
<text x="815" y="334" font-size="12" text-anchor="middle" fill="#33254A">Daya</text>

<ellipse cx="815" cy="386" rx="92" ry="28" fill="#F3EDFA" stroke="#7A5AA6" stroke-width="1.3"/>
<text x="815" y="382" font-size="12" text-anchor="middle" fill="#33254A">Hapus Mesin</text>
<text x="815" y="398" font-size="12" text-anchor="middle" fill="#33254A">Virtual</text>

<!-- Tolak / Kembalikan (extend of Setujui) -->
<ellipse cx="778" cy="452" rx="90" ry="27" fill="#F3EDFA" stroke="#7A5AA6" stroke-width="1.3"/>
<text x="778" y="456" font-size="12" text-anchor="middle" fill="#33254A">Tolak Permintaan</text>

<ellipse cx="800" cy="520" rx="92" ry="30" fill="#F3EDFA" stroke="#7A5AA6" stroke-width="1.3"/>
<text x="800" y="516" font-size="12" text-anchor="middle" fill="#33254A">Kembalikan</text>
<text x="800" y="532" font-size="12" text-anchor="middle" fill="#33254A">Permintaan</text>

<!-- Pencatatan Audit Trail (include target) -->
<ellipse cx="805" cy="590" rx="95" ry="30" fill="#F3EDFA" stroke="#7A5AA6" stroke-width="1.3"/>
<text x="805" y="586" font-size="12" text-anchor="middle" fill="#33254A">Pencatatan</text>
<text x="805" y="602" font-size="12" text-anchor="middle" fill="#33254A">Audit Trail</text>

<!-- ===================== ASSOCIATIONS (actor - use case) ===================== -->
<g stroke="#4B4B57" stroke-width="1.2">
<line x1="106" y1="132" x2="366" y2="112"/>
<line x1="106" y1="138" x2="346" y2="200"/>
<line x1="106" y1="145" x2="346" y2="305"/>
<line x1="106" y1="382" x2="354" y2="452"/>
<line x1="106" y1="622" x2="350" y2="648"/>
<line x1="106" y1="632" x2="365" y2="718"/>
</g>

<!-- ===================== INCLUDE / EXTEND ===================== -->
<!-- include: Ajukan -> Validasi -->
<line x1="558" y1="192" x2="680" y2="156" stroke="#7A5AA6" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#oa)"/>
<text x="626" y="163" font-size="10.5" text-anchor="middle" fill="#7A5AA6" font-style="italic">«include»</text>
<!-- include: Setujui -> Pencatatan Audit -->
<line x1="536" y1="478" x2="720" y2="576" stroke="#7A5AA6" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#oa)"/>
<text x="612" y="518" font-size="10.5" text-anchor="middle" fill="#7A5AA6" font-style="italic">«include»</text>

<!-- extend: Perpanjang/Ubah/Hapus -> Kelola Inventaris -->
<line x1="723" y1="262" x2="560" y2="300" stroke="#7A5AA6" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#oa)"/>
<line x1="723" y1="322" x2="560" y2="312" stroke="#7A5AA6" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#oa)"/>
<line x1="723" y1="384" x2="560" y2="324" stroke="#7A5AA6" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#oa)"/>
<text x="648" y="345" font-size="10.5" text-anchor="middle" fill="#7A5AA6" font-style="italic">«extend»</text>

<!-- extend: Tolak/Kembalikan -> Setujui -->
<line x1="688" y1="452" x2="552" y2="452" stroke="#7A5AA6" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#oa)"/>
<line x1="708" y1="522" x2="548" y2="470" stroke="#7A5AA6" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#oa)"/>
<text x="620" y="497" font-size="10.5" text-anchor="middle" fill="#7A5AA6" font-style="italic">«extend»</text>

<!-- legend -->
<g font-size="11" fill="#444">
<line x1="330" y1="742" x2="366" y2="742" stroke="#4B4B57" stroke-width="1.2"/>
<text x="372" y="746">asosiasi</text>
<line x1="470" y1="742" x2="506" y2="742" stroke="#7A5AA6" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#oa)"/>
<text x="512" y="746">«include» / «extend»</text>
<polygon points="690,736 682,748 698,748" fill="#FFFFFF" stroke="#444" stroke-width="1.2"/>
<text x="704" y="746">generalisasi</text>
</g>
</svg>
