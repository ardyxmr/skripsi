# ExoVirt — container Nginx: serves the built SPA, proxies /api|/sanctum|/broadcasting to PHP-FPM
# (service "app":9000), upgrades /app/ to Reverb (service "reverb":8080), and serves /storage from
# the shared appdata volume. TLS is terminated upstream (see README-docker.md to enable in-container).
server {
    listen 80;
    server_name _;
    client_max_body_size 12m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    # Public disk / catalog images — served from the read-only appdata volume mount.
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    # SPA (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Laravel API / Sanctum / broadcasting-auth → PHP-FPM.
    location ~ ^/(api|sanctum|broadcasting) {
        fastcgi_pass app:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_read_timeout 300s;
    }

    # Reverb WebSocket (Pusher protocol path /app/{key}).
    location /app/ {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
