; ExoVirt PHP-FPM tuning (prod).
memory_limit = 512M
upload_max_filesize = 12M
post_max_size = 12M
max_execution_time = 120
expose_php = Off

; OPcache — validate_timestamps=0 means code is cached until the container restarts (rebuild to deploy).
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
