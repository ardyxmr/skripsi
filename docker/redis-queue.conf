# ExoVirt queue + session + Reverb pub/sub Redis (container, port 6379 inside its own network namespace).
# noeviction + AOF: a dropped job = a lost provision/destroy, so this instance must NEVER evict.
# NOTE: Redis does not allow inline comments on a directive line — keep comments on their own line.
port 6379
# Isolated compose network → izinkan koneksi dari container lain (app/worker/reverb).
protected-mode no
appendonly yes
appendfsync everysec
save ""
maxmemory 512mb
maxmemory-policy noeviction
dir /data
tcp-keepalive 60
# Production: uncomment + set, then mirror into REDIS_QUEUE_PASSWORD in .env.docker.
# requirepass CHANGE_ME_IN_PROD
